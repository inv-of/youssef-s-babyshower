<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youssef's babyshower Invitation</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
    overflow:hidden;
    width:100vw;
    height:100vh;
}

#introVideo{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:2;

    opacity:1;
    transition:opacity 1.2s ease;
}

#mainFrame{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    z-index:1;

    opacity:0;
    transition:opacity 1.2s ease;
}

#introVideo.fade-out{
    opacity:0;
}

#mainFrame.show{
    opacity:1;
}

#musicBtn{
    position:fixed;
    right:15px;
    bottom:15px;
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.9);
    cursor:pointer;
    z-index:9999;
    font-size:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

</style>
</head>

<body>
    <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊</button>

<video id="introVideo" muted autoplay playsinline preload="auto">
    <source src="video.MP4" type="video/mp4">
</video>

<iframe id="mainFrame" src="main.html"></iframe>



<script>
const video = document.getElementById("introVideo");
const frame = document.getElementById("mainFrame");
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

let playing = false;

video.addEventListener("loadeddata", () => {
    video.pause();
});

video.addEventListener("click", () => {

    video.play();

    if(!playing){
        music.play();
        playing = true;
        btn.innerHTML = "🔊";
    }

});

btn.addEventListener("click", () => {

    if(playing){
        music.pause();
        btn.innerHTML = "🔇";
        playing = false;
    }else{
        music.play();
        btn.innerHTML = "🔊";
        playing = true;
    }

});

video.addEventListener("ended", () => {

    frame.classList.add("show");
    video.classList.add("fade-out");

    setTimeout(() => {
        video.style.display = "none";
    }, 1200);

});
</script>

</body>
</html>
